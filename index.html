<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrafficFlow Pro — Gestão de Tráfego Pago</title>
  <script src="js/vendor/chart.min.js"></script>
  <script src="js/vendor/lucide.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    // Emergency loader hide
    window.addEventListener('load', function() {
      setTimeout(function() {
        var el = document.getElementById('loading-screen');
        if (el) { el.style.opacity = '0'; el.style.pointerEvents = 'none'; setTimeout(function() { el.style.display = 'none'; }, 600); }
      }, 3500);
    });
    // Visible error banner for debugging
    window.onerror = function(msg, src, line) {
      var b = document.getElementById('err-banner');
      if (!b) { b = document.createElement('div'); b.id='err-banner'; b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:#ef4444;color:#fff;padding:8px 16px;font-size:12px;font-family:monospace'; document.body.appendChild(b); }
      b.textContent = '⚠ JS ERROR: ' + msg + ' (' + (src||'').split('/').pop() + ':' + line + ')';
    };
  </script>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loader-content">
    <div class="loader-logo">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 34 L14 20 L22 28 L32 12 L40 18" stroke="url(#lg1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M30 12 L40 12 L40 22" stroke="url(#lg1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="lg1" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#f59e0b"/>
        </linearGradient></defs>
      </svg>
      <span>Traffic<span class="gold">Flow</span> <sup>Pro</sup></span>
    </div>
    <div class="loader-progress"><div class="loader-bar"></div></div>
    <p class="loader-text">Inicializando sistema...</p>
  </div>
</div>

<!-- App -->
<div id="app" class="app-layout">

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-logo" onclick="navigate('overview')">
      <svg viewBox="0 0 44 44" fill="none" class="logo-svg">
        <path d="M4 34 L14 20 L22 28 L32 12 L40 18" stroke="url(#lgS)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M30 12 L40 12 L40 22" stroke="url(#lgS)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="lgS" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#f59e0b"/>
        </linearGradient></defs>
      </svg>
      <span class="logo-text">Traffic<span>Flow</span></span>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-label">Principal</span>
      <button class="nav-item active" data-view="overview">
        <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
      </button>
      <button class="nav-item" data-view="clients">
        <i data-lucide="users"></i><span>Clientes</span>
      </button>
      <button class="nav-item" data-view="board">
        <i data-lucide="kanban"></i><span>Board</span>
        <span class="nav-badge">Novo</span>
      </button>
      <button class="nav-item" data-view="rankings">
        <i data-lucide="trophy"></i><span>Rankings</span>
      </button>

      <span class="nav-label" style="margin-top:4px">Ferramentas</span>
      <button class="nav-item" data-view="assistant">
        <i data-lucide="bot"></i><span>Assistente IA</span>
      </button>
      <button class="nav-item" data-view="settings">
        <i data-lucide="settings"></i><span>Configurações</span>
      </button>

      <div class="nav-divider"></div>
      <button class="nav-item nav-add" onclick="openAddClientModal()">
        <i data-lucide="plus-circle"></i><span>Novo Cliente</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div id="sidebar-mode" class="sidebar-mode">
        <span class="mode-dot demo"></span><span>Modo Demo</span>
      </div>
      <span>v2.0</span>
    </div>
  </aside>
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <!-- ── Main ─────────────────────────────────────────── -->
  <div class="main-content">
    <header class="top-bar">
      <button id="menu-toggle" class="menu-toggle">
        <i data-lucide="menu"></i>
      </button>
      <div class="top-bar-left">
        <span class="top-bar-title" id="topbar-title">Dashboard</span>
      </div>
      <div class="top-bar-right">
        <div class="search-box">
          <i data-lucide="search"></i>
          <input id="global-search" type="text" placeholder="Buscar cliente..." oninput="onSearch(this.value)" />
        </div>
        <button class="btn-icon" onclick="exportAllCSV()" title="Exportar CSV"><i data-lucide="download"></i></button>
        <button class="btn-icon" onclick="openAddClientModal()" title="Novo Cliente"><i data-lucide="plus"></i></button>
      </div>
    </header>

    <main class="page-content">
      <div class="period-bar" id="period-bar"></div>

      <!-- OVERVIEW -->
      <section id="section-overview" class="section">
        <div class="section-header">
          <h2><i data-lucide="layout-dashboard"></i> Dashboard</h2>
          <div class="section-actions">
            <button class="btn-ghost" onclick="exportAllCSV()"><i data-lucide="download"></i> Exportar</button>
            <button class="btn-primary" onclick="openAddClientModal()"><i data-lucide="plus"></i> Novo Cliente</button>
          </div>
        </div>
        <div class="kpi-grid" id="ov-kpi-grid"></div>
        <div id="ov-charts"></div>
      </section>

      <!-- CLIENTS -->
      <section id="section-clients" class="section hidden">
        <div class="section-header">
          <h2><i data-lucide="users"></i> Clientes <span id="clients-count" class="count-badge">0</span></h2>
          <div class="section-actions">
            <div class="view-toggle">
              <button class="vt-btn active" id="vt-grid" onclick="setClientsView('grid')"><i data-lucide="grid-3x3"></i></button>
              <button class="vt-btn" id="vt-list" onclick="setClientsView('list')"><i data-lucide="list"></i></button>
            </div>
            <button class="btn-primary" onclick="openAddClientModal()"><i data-lucide="plus"></i> Novo</button>
          </div>
        </div>
        <div class="filters-row">
          <select id="filter-status" class="filter-select" onchange="renderClients()">
            <option value="all">Todos os status</option>
            <option value="active">Ativos</option>
            <option value="paused">Pausados</option>
          </select>
          <select id="filter-niche" class="filter-select" onchange="renderClients()">
            <option value="all">Todos os nichos</option>
          </select>
          <select id="filter-board-status" class="filter-select" onchange="renderClients()">
            <option value="all">Todas as fases</option>
            <option value="prospecting">Prospecção</option>
            <option value="active">Ativo</option>
            <option value="optimizing">Otimizando</option>
            <option value="paused">Em Pausa</option>
            <option value="closed">Encerrado</option>
          </select>
          <select id="filter-platform" class="filter-select" onchange="renderClients()">
            <option value="all">Todas as plataformas</option>
            <option value="facebook">Facebook</option>
            <option value="google">Google</option>
            <option value="tiktok">TikTok</option>
            <option value="multi">Multi</option>
          </select>
        </div>
        <div id="clients-grid" class="clients-grid"></div>
      </section>

      <!-- BOARD -->
      <section id="section-board" class="section hidden">
        <div class="section-header">
          <h2><i data-lucide="kanban"></i> Board de Projetos</h2>
          <div class="section-actions">
            <span class="board-summary" id="board-summary"></span>
            <button class="btn-ghost" onclick="openAddClientModal()"><i data-lucide="plus"></i> Novo Projeto</button>
          </div>
        </div>
        <div class="board-scroll">
          <div class="board-container" id="board-container"></div>
        </div>
      </section>

      <!-- CLIENT DETAIL -->
      <section id="section-client-detail" class="section hidden">
        <button class="cd-back" onclick="navigate(STATE.prevView || 'clients')">
          <i data-lucide="arrow-left"></i> Voltar
        </button>
        <div id="cd-hero"></div>
        <div class="kpi-grid" id="cd-kpi-grid"></div>
        <div id="cd-charts"></div>
        <div id="cd-campaigns"></div>
      </section>

      <!-- RANKINGS -->
      <section id="section-rankings" class="section hidden">
        <div class="section-header">
          <h2><i data-lucide="trophy"></i> Rankings</h2>
        </div>
        <div id="rankings-content"></div>
      </section>

      <!-- ASSISTANT -->
      <section id="section-assistant" class="section hidden">
        <div class="section-header">
          <h2><i data-lucide="bot"></i> Assistente IA</h2>
        </div>
        <div id="assistant-content"></div>
      </section>

      <!-- SETTINGS -->
      <section id="section-settings" class="section hidden">
        <div class="section-header">
          <h2><i data-lucide="settings"></i> Configurações</h2>
        </div>
        <div id="settings-content"></div>
      </section>

    </main>
  </div>
</div>

<!-- Modal: Add/Edit Client -->
<div id="modal-add-client" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Novo Cliente</h3>
      <button class="modal-close" onclick="closeModal('modal-add-client')"><i data-lucide="x"></i></button>
    </div>
    <form id="add-client-form" onsubmit="submitAddClient(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Nome do Cliente *</label>
          <input id="inp-name" type="text" placeholder="Ex: Clínica Bella Vita" required />
        </div>
        <div class="form-group">
          <label>Nicho *</label>
          <select id="inp-niche" required>
            <option value="">Selecione</option>
            <option>Estética &amp; Saúde</option><option>Fitness &amp; Academia</option>
            <option>Imóveis</option><option>Educação</option><option>E-commerce</option>
            <option>Jurídico</option><option>Restaurante &amp; Gastronomia</option>
            <option>Moda</option><option>Tecnologia</option><option>Serviços</option><option>Outro</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Fase no Board</label>
          <select id="inp-board-status">
            <option value="prospecting">Prospecção</option>
            <option value="active" selected>Ativo</option>
            <option value="optimizing">Otimizando</option>
            <option value="paused">Em Pausa</option>
            <option value="closed">Encerrado</option>
          </select>
        </div>
        <div class="form-group">
          <label>Plataforma</label>
          <select id="inp-platform">
            <option value="facebook">Facebook Ads</option>
            <option value="google">Google Ads</option>
            <option value="tiktok">TikTok Ads</option>
            <option value="multi">Multi-plataforma</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>ID da Conta de Anúncio</label>
          <input id="inp-acc-id" type="text" placeholder="act_123456789" />
        </div>
        <div class="form-group">
          <label>Orçamento Mensal (R$)</label>
          <input id="inp-budget" type="number" placeholder="10000" min="0" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Contato</label>
          <input id="inp-contact" type="text" placeholder="João Silva" />
        </div>
        <div class="form-group">
          <label>E-mail</label>
          <input id="inp-email" type="email" placeholder="joao@empresa.com" />
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Observações</label>
        <textarea id="inp-notes" placeholder="Objetivos, pontos de atenção, histórico..." rows="2"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-ghost" onclick="closeModal('modal-add-client')">Cancelar</button>
        <button type="submit" class="btn-primary"><i data-lucide="check"></i> <span id="modal-submit-label">Cadastrar</span></button>
      </div>
    </form>
  </div>
</div>

<div id="notifications"></div>

<script src="js/config.js?v=3"></script>
<script src="js/facebook-api.js?v=3"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
